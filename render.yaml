services:
  - type: web
    name: config-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_PORT
        value: 8892
      - key: APP_WORKERS
        value: 11
      - key: APP_DEBUG
        value: false
      - key: APP_LOG_LEVEL
        value: warning
      - key: APP_API_KEY
        value: key-sl5dsm5zj7
    buildFilter:
      paths:
        - main.py
        - requirements.txt
        - config.development.yaml
        - .env
    plan: free